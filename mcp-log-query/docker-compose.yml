version: '3.8'

services:
  mcp-log-query:
    build: .
    container_name: mcp-log-query
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # 如果需要从配置文件读取敏感信息，可以挂载配置
    # volumes:
    #   - ./config.js:/app/config.js:ro
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

